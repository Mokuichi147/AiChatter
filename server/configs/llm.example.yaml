# メインLLM設定
model: "gpt-4o"
base_url: "http://localhost:11434/v1"
api_key: ""                # 空なら "no-key" をフォールバック
reasoning: ""              # low, medium, high (空=未指定)

# サブエージェントLLM (省略時はメインと同じ)
sub:
  model: ""
  base_url: ""
  api_key: ""              # 空ならメインapi_key を使用
  reasoning: ""

# Embeddings API設定 (省略時は無効)
embeddings:
  model: ""                # 例: text-embedding-3-small
  base_url: ""             # 空ならメインbase_url を使用
  api_key: ""              # 空ならメインapi_key を使用
  dimensions: 0            # 0なら未指定（モデル既定）
  bm25_weight: 0.4         # BM25スコア重み
  embedding_weight: 0.3    # Embeddingスコア重み
  rerank_weight: 0.3       # リランキングスコア重み

# Rerank API設定 (省略時は無効)
# POST /v1/rerank エンドポイントを使用 (Jina, Cohere, vLLM等)
rerank:
  model: ""                # 例: jina-reranker-v2-base-multilingual
  base_url: ""             # 空ならメインbase_url を使用
  api_key: ""              # 空ならメインapi_key を使用
  top_n: 20                # リランキング対象の最大件数
